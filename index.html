<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Silsilah Trah Kariyorejan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9962a;
      --gold-light: #e8b84b;
      --gold-dim: rgba(201,150,42,0.15);
      --bg: #100e0a;
      --surface: #1a1610;
      --surface2: #231f18;
      --surface3: #2e2820;
      --border: rgba(201,150,42,0.18);
      --text: #f0e8d8;
      --text-muted: #9e9080;
      --red: #d94040;
      --blue: #4a7fcb;
      --radius: 14px;
      --tab-h: 64px;
      --header-h: 56px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      padding-bottom: calc(var(--tab-h) + env(safe-area-inset-bottom, 0px));
      overflow-x: hidden;
    }

    /* ── HEADER ── */
    #header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(16,14,10,0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 1rem;
      height: var(--header-h);
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    #header .logo {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--gold-light);
      white-space: nowrap;
      flex-shrink: 0;
    }

    #searchWrap {
      flex: 1;
      position: relative;
      min-width: 0;
    }

    #searchBox {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      padding: 0.45rem 2.2rem 0.45rem 2.2rem;
      outline: none;
      transition: border-color 0.2s;
    }
    #searchBox:focus { border-color: var(--gold); }
    #searchBox::placeholder { color: var(--text-muted); }

    .search-icon {
      position: absolute;
      left: 0.65rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 0.85rem;
      pointer-events: none;
    }

    #clearBtn {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      background: var(--surface3);
      border: none;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      color: var(--text-muted);
      font-size: 0.75rem;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    #searchBox:not(:placeholder-shown) ~ #clearBtn { display: flex; }

    /* ── FILTER BAR ── */
    #filterBar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.5rem 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      overflow-x: auto;
      scrollbar-width: none;
    }
    #filterBar::-webkit-scrollbar { display: none; }

    .filter-chip {
      flex-shrink: 0;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.3rem 0.85rem;
      cursor: pointer;
      transition: all 0.18s;
      white-space: nowrap;
    }
    .filter-chip:hover, .filter-chip.active {
      background: var(--gold-dim);
      border-color: var(--gold);
      color: var(--gold-light);
    }

    #counterText {
      margin-left: auto;
      flex-shrink: 0;
      font-size: 0.72rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    /* ── MAIN CONTENT ── */
    #content {
      padding: 1rem;
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── LIST VIEW ── */
    .gen-group { margin-bottom: 1.5rem; }

    .gen-header {
      font-family: 'Playfair Display', serif;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gold);
      padding: 0.25rem 0 0.6rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 0.6rem;
    }

    .member-card {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 0.7rem 0.85rem;
      margin-bottom: 0.45rem;
      transition: border-color 0.15s, background 0.15s;
      cursor: default;
    }
    .member-card:hover { border-color: var(--border); background: var(--surface2); }

    .avatar {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      font-weight: 600;
      flex-shrink: 0;
      font-family: 'Playfair Display', serif;
    }
    .avatar.female { background: rgba(217,64,64,0.18); color: #e07070; border: 1.5px solid rgba(217,64,64,0.3); }
    .avatar.male   { background: rgba(74,127,203,0.18); color: #7aaae0; border: 1.5px solid rgba(74,127,203,0.3); }

    .card-info { flex: 1; min-width: 0; }
    .card-name {
      font-weight: 500;
      font-size: 0.9rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-spouse {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.1rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-spouse::before { content: "♥ "; color: var(--gold); }

    .card-badge {
      flex-shrink: 0;
      font-size: 0.65rem;
      font-weight: 600;
      background: var(--gold-dim);
      color: var(--gold);
      border: 1px solid rgba(201,150,42,0.25);
      border-radius: 999px;
      padding: 0.15rem 0.55rem;
      letter-spacing: 0.04em;
    }

    mark { background: rgba(232,184,75,0.3); color: var(--gold-light); border-radius: 3px; padding: 0 2px; }

    /* ── TREE VIEW ── */
    #treeRoot ul {
      list-style: none;
      padding-left: 1.25rem;
      margin-top: 0.2rem;
      border-left: 1px dashed var(--border);
    }

    #treeRoot > ul { padding-left: 0; border-left: none; }

    .tree-node {
      margin: 0.35rem 0;
      position: relative;
    }

    .tree-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.6rem;
      border-radius: 10px;
      transition: background 0.15s;
    }
    .tree-row:hover { background: var(--surface2); }

    .tree-toggle {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: var(--gold);
      cursor: pointer;
      transition: background 0.15s;
    }
    .tree-toggle:hover { background: var(--gold-dim); }

    .tree-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .tree-dot.female { background: #e07070; }
    .tree-dot.male   { background: #7aaae0; }
    .tree-dot.root   { background: var(--gold-light); width: 10px; height: 10px; }

    .tree-label {
      font-size: 0.9rem;
      line-height: 1.3;
    }
    .tree-label.root-label {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--gold-light);
    }

    .tree-spouse {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-left: 0.3rem;
    }
    .tree-spouse::before { content: "& "; }

    .hidden { display: none !important; }

    /* ── EMPTY STATE ── */
    #emptyState {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
    #emptyState .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
    #emptyState p { font-size: 0.9rem; }

    /* ── BOTTOM TAB BAR ── */
    #tabBar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 300;
      height: calc(var(--tab-h) + env(safe-area-inset-bottom, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      background: rgba(22,19,14,0.96);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
    }

    .tab-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.25rem;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.68rem;
      font-weight: 500;
      cursor: pointer;
      transition: color 0.18s;
      padding: 0;
    }
    .tab-btn .tab-icon {
      font-size: 1.25rem;
      line-height: 1;
    }
    .tab-btn.active { color: var(--gold-light); }
    .tab-btn.active .tab-icon { filter: drop-shadow(0 0 6px rgba(232,184,75,0.5)); }

    /* ── EXPAND/COLLAPSE PILL ── */
    #treeActions {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .pill-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.3rem 0.85rem;
      cursor: pointer;
      transition: all 0.18s;
    }
    .pill-btn:hover { border-color: var(--gold); color: var(--gold-light); }

    /* ── LOADING ── */
    #loading {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }
    .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PRINT ── */
    @media print {
      #tabBar, #filterBar, #header, #treeActions { display: none !important; }
      body { padding-bottom: 0; }
    }

    /* ── DESKTOP TWEAKS ── */
    @media (min-width: 680px) {
      #content { padding: 1.5rem; }
      .member-card { padding: 0.85rem 1rem; }
      #tabBar {
        max-width: 680px;
        left: 50%;
        transform: translateX(-50%);
        border-left: 1px solid var(--border);
        border-right: 1px solid var(--border);
        border-radius: 16px 16px 0 0;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div id="header">
    <div class="logo">⟡ Silsilah Trah Kariyorejan ⟡</div>
    <div id="searchWrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="searchBox" placeholder="Cari nama anggota..." autocomplete="off" oninput="handleSearch()" />
      <button id="clearBtn" onclick="clearSearch()" aria-label="Hapus pencarian">×</button>
    </div>
  </div>

  <!-- FILTER CHIPS -->
  <div id="filterBar">
    <button class="filter-chip active" data-gen="" onclick="setGenFilter(this, '')">Semua</button>
    <button class="filter-chip" data-gen="1" onclick="setGenFilter(this, '1')">Generasi 1</button>
    <button class="filter-chip" data-gen="2" onclick="setGenFilter(this, '2')">Generasi 2</button>
    <button class="filter-chip" data-gen="3" onclick="setGenFilter(this, '3')">Generasi 3</button>
    <button class="filter-chip" data-gen="4" onclick="setGenFilter(this, '4')">Generasi 4</button>
    <button class="filter-chip" data-gen="5" onclick="setGenFilter(this, '5')">Generasi 5</button>
    <span id="counterText">–</span>
  </div>

  <!-- CONTENT -->
  <div id="content">
    <div id="loading"><div class="spinner"></div>Memuat data silsilah…</div>

    <!-- LIST VIEW -->
    <div id="listView" class="hidden"></div>

    <!-- TREE VIEW -->
    <div id="treeView" class="hidden">
      <div id="treeActions">
        <button class="pill-btn" onclick="expandAll()">▼ Buka Semua</button>
        <button class="pill-btn" onclick="collapseAll()">▲ Tutup Semua</button>
      </div>
      <div id="treeRoot"></div>
    </div>

    <div id="emptyState" class="hidden">
      <div class="empty-icon">🔎</div>
      <p>Tidak ada anggota yang cocok.</p>
    </div>
  </div>

  <!-- BOTTOM TAB BAR -->
  <nav id="tabBar">
    <button class="tab-btn active" id="tabList" onclick="switchView('list')">
      <span class="tab-icon">☰</span>
      Daftar
    </button>
    <button class="tab-btn" id="tabTree" onclick="switchView('tree')">
      <span class="tab-icon">🌿</span>
      Pohon
    </button>
    <button class="tab-btn" onclick="window.print()">
      <span class="tab-icon">🖨️</span>
      Cetak
    </button>
  </nav>

  <script>
    const sheetURL = "data.csv";
    // const sheetURL = "https://docs.google.com/spreadsheets/d/e/...";

    let allData = [];
    let currentView = 'list';
    let currentGen = '';
    let currentKeyword = '';
    let treeExpanded = false;

    // ── INIT ──
    async function init() {
      try {
        const data = await loadCSV(sheetURL);
        allData = data;
        document.getElementById('loading').style.display = 'none';
        renderAll();
      } catch (err) {
        document.getElementById('loading').innerHTML = '<p style="color:var(--text-muted)">Gagal memuat data.</p>';
        console.error(err);
      }
    }

    async function loadCSV(url) {
      const res = await fetch(url);
      const text = await res.text();
      const rows = text.trim().split('\n').map(r => r.split(','));
      const headers = rows[0].map(h => h.trim());
      return rows.slice(1).map(row => {
        const obj = {};
        headers.forEach((h, i) => obj[h] = (row[i] || '').trim());
        return obj;
      });
    }

    // ── FILTER ──
    function filteredData() {
      return allData.filter(d => {
        const matchGen = !currentGen || d.Generasi === currentGen;
        const text = ((d.Nama || '') + ' ' + (d.Pasangan || '')).toLowerCase();
        const matchKw = !currentKeyword || text.includes(currentKeyword);
        return matchGen && matchKw;
      });
    }

    // ── RENDER COORDINATOR ──
    function renderAll() {
      const data = filteredData();
      document.getElementById('counterText').textContent = `${data.length} anggota`;
      if (currentView === 'list') renderList(data);
      else renderTree();
    }

    // ── LIST VIEW ──
    function renderList(data) {
      const container = document.getElementById('listView');
      container.classList.remove('hidden');
      document.getElementById('treeView').classList.add('hidden');
      document.getElementById('emptyState').classList.add('hidden');

      if (!data.length) {
        container.innerHTML = '';
        document.getElementById('emptyState').classList.remove('hidden');
        return;
      }

      // Group by generation
      const groups = {};
      const genLabels = { '': 'Akar', '1': 'Anak', '2': 'Cucu', '3': 'Buyut', '4': 'Canggah', '5': 'Wareng' };
      data.forEach(d => {
        const g = d.Generasi || '';
        if (!groups[g]) groups[g] = [];
        groups[g].push(d);
      });

      const html = Object.entries(groups).map(([gen, members]) => {
        const label = genLabels[gen] || `Generasi ${gen}`;
        const cards = members.map(m => memberCard(m)).join('');
        // Only show gen header when showing all or multiple groups
        const header = !currentGen ? `<div class="gen-header">Generasi ${gen} · ${label}</div>` : '';
        return `<div class="gen-group">${header}${cards}</div>`;
      }).join('');

      container.innerHTML = html;
    }

    function memberCard(d) {
      const initials = (d.Nama || '?').charAt(0).toUpperCase();
      const genderClass = detectGender(d);
      const nameHtml = highlight(d.Nama || '');
      const spouseHtml = d.Pasangan && d.Pasangan !== '-'
        ? `<div class="card-spouse">${highlight(d.Pasangan)}</div>` : '';
      const badge = d.Generasi ? `<span class="card-badge">Gen ${d.Generasi}</span>` : '';
      return `
        <div class="member-card">
          <div class="avatar ${genderClass}">${initials}</div>
          <div class="card-info">
            <div class="card-name">${nameHtml}</div>
            ${spouseHtml}
          </div>
          ${badge}
        </div>`;
    }

    // ── TREE VIEW ──
    function renderTree() {
      document.getElementById('listView').classList.add('hidden');
      document.getElementById('treeView').classList.remove('hidden');
      document.getElementById('emptyState').classList.add('hidden');

      const root = document.getElementById('treeRoot');
      root.innerHTML = '';
      const tree = buildTreeNode(allData, '');
      if (tree) root.appendChild(tree);
    }

    function buildTreeNode(data, parentId) {
      const children = data.filter(d => d['Parent ID'] === parentId);
      if (!children.length) return null;

      const ul = document.createElement('ul');
      children.forEach(child => {
        const isRoot = !child['Parent ID'];
        const li = document.createElement('li');
        li.className = 'tree-node';
        li.dataset.id = child.ID;
        li.dataset.gen = child.Generasi || '';
        li.dataset.name = ((child.Nama || '') + ' ' + (child.Pasangan || '')).toLowerCase();

        const row = document.createElement('div');
        row.className = 'tree-row';

        const subtree = buildTreeNode(data, child.ID);

        // Toggle
        if (subtree) {
          const toggle = document.createElement('div');
          toggle.className = 'tree-toggle';
          toggle.textContent = '+';
          toggle.onclick = () => {
            const hidden = subtree.classList.toggle('hidden');
            toggle.textContent = hidden ? '+' : '−';
          };
          row.appendChild(toggle);
          subtree.classList.add('hidden');
        } else {
          const spacer = document.createElement('div');
          spacer.style.width = '20px';
          spacer.style.flexShrink = '0';
          row.appendChild(spacer);
        }

        // Dot
        const dot = document.createElement('div');
        dot.className = `tree-dot ${isRoot ? 'root' : detectGender(child)}`;
        row.appendChild(dot);

        // Label
        const label = document.createElement('span');
        label.className = `tree-label${isRoot ? ' root-label' : ''}`;
        const nameHtml = highlight(child.Nama || '');
        const spouseHtml = child.Pasangan && child.Pasangan !== '-'
          ? `<span class="tree-spouse">${highlight(child.Pasangan)}</span>` : '';
        label.innerHTML = nameHtml + spouseHtml;
        row.appendChild(label);

        li.appendChild(row);
        if (subtree) li.appendChild(subtree);
        ul.appendChild(li);
      });

      return ul;
    }

    // ── TREE ACTIONS ──
    function expandAll() {
      document.querySelectorAll('#treeRoot ul').forEach(ul => ul.classList.remove('hidden'));
      document.querySelectorAll('#treeRoot .tree-toggle').forEach(t => t.textContent = '−');
    }

    function collapseAll() {
      document.querySelectorAll('#treeRoot > ul ul').forEach(ul => ul.classList.add('hidden'));
      document.querySelectorAll('#treeRoot .tree-toggle').forEach(t => t.textContent = '+');
    }

    // ── SEARCH ──
    function handleSearch() {
      currentKeyword = document.getElementById('searchBox').value.trim().toLowerCase();
      if (currentView === 'list') {
        renderAll();
      } else {
        filterTree();
      }
    }

    function filterTree() {
      const nodes = document.querySelectorAll('#treeRoot .tree-node');
      if (!currentKeyword && !currentGen) {
        nodes.forEach(n => n.style.display = '');
        return;
      }
      nodes.forEach(n => {
        const nameMatch = !currentKeyword || n.dataset.name.includes(currentKeyword);
        const genMatch = !currentGen || n.dataset.gen === currentGen;
        n.style.display = (nameMatch && genMatch) ? '' : 'none';
        if (nameMatch && genMatch) expandParents(n);
      });
      const visible = [...nodes].filter(n => n.style.display !== 'none').length;
      document.getElementById('counterText').textContent = `${visible} anggota`;
    }

    function expandParents(node) {
      let p = node.parentElement.closest('.tree-node');
      while (p) {
        p.style.display = '';
        const ul = p.querySelector('ul');
        if (ul) ul.classList.remove('hidden');
        const t = p.querySelector('.tree-toggle');
        if (t) t.textContent = '−';
        p = p.parentElement.closest('.tree-node');
      }
    }

    function clearSearch() {
      document.getElementById('searchBox').value = '';
      currentKeyword = '';
      renderAll();
    }

    // ── GENERATION FILTER ──
    function setGenFilter(btn, gen) {
      currentGen = gen;
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      if (currentView === 'list') renderAll();
      else filterTree();
    }

    // ── VIEW SWITCH ──
    function switchView(view) {
      currentView = view;
      document.getElementById('tabList').classList.toggle('active', view === 'list');
      document.getElementById('tabTree').classList.toggle('active', view === 'tree');
      renderAll();
    }

    // ── HELPERS ──
    function highlight(text) {
      if (!currentKeyword || !text) return text;
      const re = new RegExp(`(${currentKeyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
      return text.replace(re, '<mark>$1</mark>');
    }

    function detectGender(d) {
      const name = (d.Nama || '').toLowerCase();
      // Rough heuristic for Javanese names — adjust as needed
      const femaleHints = ['ni', 'wati', 'sari', 'yati', 'ningsih', 'wahyu', 'sri', 'dewi', 'suci'];
      return femaleHints.some(h => name.includes(h)) ? 'female' : 'male';
    }

    init();
  </script>
</body>
</html>
