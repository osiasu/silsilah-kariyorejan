name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main          # trigger on every push to main
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Inject GitHub Variables into every HTML file ──────────────────────
      # Placeholders in source:  __SUPABASE_URL__  __SUPABASE_KEY__
      #                          __ADMIN_PIN__      __GUEST_PIN__
      #                          __DEFAULT_PAGE__
      #
      # Use vars.*  for GitHub Variables  (Settings → Secrets & variables → Variables)
      # Use secrets.* for GitHub Secrets  (Settings → Secrets & variables → Secrets)
      # Recommendation: store ADMIN_PIN and SUPABASE_KEY as Secrets, not Variables.
      # ─────────────────────────────────────────────────────────────────────

      - name: Inject credentials into HTML files
        env:
          SUPABASE_URL:  ${{ vars.SUPABASE_URL }}
          SUPABASE_KEY:  ${{ secrets.SUPABASE_KEY }}   # key → Secret (masked in logs)
          ADMIN_PIN:     ${{ secrets.ADMIN_PIN }}       # PIN  → Secret (masked in logs)
          GUEST_PIN:     ${{ secrets.GUEST_PIN }}       # PIN  → Secret (masked in logs)
          DEFAULT_PAGE:  ${{ vars.DEFAULT_PAGE || 'dashboard.html' }}
        run: |
          for file in *.html; do
            sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g" "$file"
            sed -i "s|__SUPABASE_KEY__|${SUPABASE_KEY}|g" "$file"
            sed -i "s|__ADMIN_PIN__|${ADMIN_PIN}|g"       "$file"
            sed -i "s|__GUEST_PIN__|${GUEST_PIN}|g"       "$file"
            sed -i "s|__DEFAULT_PAGE__|${DEFAULT_PAGE}|g" "$file"
          done

      # ── Deploy the injected files to GitHub Pages ─────────────────────────

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'          # upload the entire repo root (all .html files etc.)

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
