<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Pengenalan — Silsilah Trah Kariyorejan</title>
  <script>
    (function() {
      var theme = localStorage.getItem('trah_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="menu.css">
  <style>
    :root{--gold:#b8822e;--gold-light:#d4a55a;--gold-dim:rgba(184,130,46,0.12);--bg:#0f0d0a;--surface:#1a1611;--surface2:#221d15;--surface3:#2d2720;--border:rgba(184,130,46,0.15);--text:#f0ebe2;--text-muted:#8a7d6e;--header-h:56px;}
    [data-theme="light"]{--bg:#faf8f5;--surface:#ffffff;--surface2:#f0ede6;--surface3:#e8e4da;--border:rgba(184,130,46,0.12);--text:#1a1611;--text-muted:#7a6f62;}
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden;}
    .page-content{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:calc(100dvh - var(--header-h));padding:2rem 1.5rem;text-align:center;}
    .maintenance-icon{font-size:3.5rem;margin-bottom:1.25rem;animation:pulse 2.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
    .maintenance-title{font-family:'Plus Jakarta Sans',sans-serif;font-size:1.5rem;color:var(--gold-light);margin-bottom:0.6rem;}
    .maintenance-sub{font-size:0.88rem;color:var(--text-muted);max-width:320px;line-height:1.65;margin-bottom:2rem;}
    .back-link{display:inline-flex;align-items:center;gap:0.5rem;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:0.5rem 1.25rem;color:var(--text-muted);font-size:0.82rem;text-decoration:none;transition:all 0.18s;}
    .back-link:hover{border-color:var(--gold);color:var(--gold-light);}
    .decoration{width:120px;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 1.5rem;}
  </style>
</head>
<body>

  <div id="header">
    <div class="header__left">
      <a href="dashboard.html" class="logo-link">
        <img class="logo-img" src="https://res.cloudinary.com/dteeybsew/image/upload/v1778418213/logo-dark_qfsc2j.png" alt="Logo">
      </a>
    </div>
    <div class="header__main">
      <button class="header__menu" type="button" aria-label="Buka menu" aria-expanded="false" aria-controls="menuOverlay">
        <div class="header__menu-icon">
          <div class="header__menu-line is-top"></div>
          <div class="header__menu-line is-bottom"></div>
        </div>
        <span class="header__menu-txt">Menu</span>
      </button>
      <button class="header__theme" type="button" aria-label="Ganti tema">
        <div class="header__theme-night">
          <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 16 16" fill="none">
            <path d="M14.845 8.36965C14.7735 9.69243 14.3205 10.9662 13.5406 12.037C12.7607 13.1079 11.6874 13.9298 10.4503 14.4036C9.21321 14.8774 7.86538 14.9827 6.56972 14.7068C5.27407 14.431 4.08605 13.7857 3.14929 12.849C2.21253 11.9123 1.56714 10.7244 1.29113 9.42878C1.01511 8.13315 1.12029 6.78531 1.59395 5.54818C2.06762 4.31106 2.88948 3.23761 3.9602 2.45761C5.03092 1.67761 6.30465 1.22444 7.62741 1.1529C7.93599 1.13613 8.09752 1.50337 7.9337 1.7647C7.38581 2.64132 7.15121 3.67774 7.26818 4.70485C7.38515 5.73196 7.84679 6.6891 8.57776 7.42008C9.30873 8.15105 10.2659 8.61269 11.293 8.72966C12.3201 8.84662 13.3565 8.61203 14.2331 8.06413C14.4953 7.90033 14.8617 8.06108 14.845 8.36965Z" stroke="currentColor" stroke-width="1.71429" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="header__theme-day">
          <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="4" fill="currentColor"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
        </div>
      </button>
      <div class="header__prc">
        <div id="progress" class="header__prc-txt">0%</div>
      </div>
    </div>
    <div class="header__right">
      <a class="header__cta" href="index.html">Pohon Silsilah</a>
    </div>
  </div>

  <div class="page-content">
    <div class="maintenance-icon">📖</div>
    <div class="decoration"></div>
    <div class="maintenance-title">Pengenalan</div>
    <div class="maintenance-sub">Halaman ini sedang dalam pengembangan. Konten pengenalan tentang sejarah dan latar belakang Trah Kariyorejan akan segera hadir.</div>
    <a href="index.html" class="back-link">← Kembali ke Pohon Silsilah</a>
  </div>

  <script src="menu.js"></script>
</body>
</html>
